<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Car Controller</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon">
<link rel="apple-touch-icon" href="/icon.png">
<link rel="icon" href="/icon.png" type="image/png" sizes="48x48">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #1a1a2e;
    color: #eee;
    height: 100vh;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* Header */
  header {
    padding: 10px 20px;
    background: #16213e;
    border-bottom: 1px solid #0f3460;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  header h1 img { width: 28px; height: 28px; border-radius: 4px; }
  .status-group { display: flex; gap: 12px; align-items: center; }
  .indicator { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #888; }
  .indicator .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #e94560; transition: background 0.3s;
  }
  .indicator .dot.on { background: #2ecc71; box-shadow: 0 0 6px rgba(46,204,113,0.6); }

  .main { flex: 1; display: flex; overflow: hidden; }

  /* Left panel */
  .viz-panel {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; padding: 16px; overflow-y: auto;
  }

  /* Car top-down */
  .car-container { position: relative; width: 180px; height: 280px; }
  .car-body {
    position: absolute; top: 30px; left: 25px;
    width: 130px; height: 220px;
    background: #2c3e6d; border-radius: 30px 30px 20px 20px;
    border: 2px solid #4a6fa5;
  }
  .car-front {
    position: absolute; top: 40px; left: 60px;
    width: 60px; height: 10px;
    background: #f39c12; border-radius: 4px;
  }
  .wheel {
    position: absolute; width: 22px; height: 50px;
    border-radius: 6px; background: #555; border: 2px solid #888;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
  }
  .wheel.active-fwd { background: #2ecc71; border-color: #27ae60; }
  .wheel.active-bwd { background: #e74c3c; border-color: #c0392b; }
  .wheel-arrow { font-size: 18px; color: #fff; opacity: 0; transition: opacity 0.1s; }
  .wheel.active-fwd .wheel-arrow,
  .wheel.active-bwd .wheel-arrow { opacity: 1; }
  .wh-fl { top: 50px; left: 8px; }
  .wh-fr { top: 50px; right: 8px; }
  .wh-rl { top: 180px; left: 8px; }
  .wh-rr { top: 180px; right: 8px; }

  /* Direction arrow */
  .direction-arrow { width: 60px; height: 60px; transition: transform 0.15s; }
  .direction-arrow svg { width: 100%; height: 100%; }
  .direction-arrow.hidden svg { opacity: 0.15; }

  /* Middle section: joystick + WASD side by side */
  .input-row {
    display: flex; align-items: center; gap: 32px;
  }

  /* Virtual joystick */
  .joystick-container {
    width: 160px; height: 160px;
    border-radius: 50%;
    background: #16213e;
    border: 2px solid #4a6fa5;
    position: relative;
    touch-action: none;
    cursor: crosshair;
  }
  .joystick-crosshair-h, .joystick-crosshair-v {
    position: absolute; background: #2a3a4e;
  }
  .joystick-crosshair-h {
    width: 100%; height: 1px; top: 50%; left: 0;
  }
  .joystick-crosshair-v {
    width: 1px; height: 100%; left: 50%; top: 0;
  }
  .joystick-knob {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: #4a6fa5;
    border: 2px solid #6a8fc5;
    position: absolute;
    top: 58px; left: 58px;
    pointer-events: none;
    transition: none;
    box-shadow: 0 0 8px rgba(74,111,165,0.4);
  }
  .joystick-knob.active {
    background: #2ecc71;
    border-color: #27ae60;
    box-shadow: 0 0 12px rgba(46,204,113,0.5);
  }

  /* WASD */
  .controls {
    display: grid;
    grid-template-columns: 56px 56px 56px;
    grid-template-rows: 56px 56px;
    gap: 4px;
  }
  .key-btn {
    width: 56px; height: 56px;
    border: 2px solid #4a6fa5; border-radius: 8px;
    background: #16213e; color: #eee;
    font-size: 20px; font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.1s;
  }
  .key-btn:hover { border-color: #6a8fc5; }
  .key-btn.active {
    background: #0f3460; border-color: #2ecc71;
    color: #2ecc71; box-shadow: 0 0 12px rgba(46,204,113,0.3);
  }
  .key-w { grid-column: 2; }
  .key-a { grid-column: 1; grid-row: 2; }
  .key-s { grid-column: 2; grid-row: 2; }
  .key-d { grid-column: 3; grid-row: 2; }

  /* Motor values */
  .motor-values { display: flex; gap: 32px; font-size: 13px; }
  .motor-val { text-align: center; }
  .motor-val .label { color: #888; margin-bottom: 2px; }
  .motor-val .value {
    font-size: 24px; font-weight: bold;
    font-family: 'Courier New', monospace;
  }
  .motor-bar {
    width: 56px; height: 6px; background: #333;
    border-radius: 3px; margin-top: 4px; overflow: hidden;
  }
  .motor-bar-fill {
    height: 100%; border-radius: 3px;
    transition: width 0.1s, background 0.1s;
  }
  .motor-val .value.rpm { color: #f39c12; font-size: 20px; }

  /* Config panel */
  .config-panel {
    display: flex; gap: 20px; padding: 8px 16px;
    background: #16213e; border-radius: 8px;
    border: 1px solid #0f3460;
  }
  .config-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .config-item label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .config-item input[type="range"] {
    width: 100px; accent-color: #2ecc71; cursor: pointer;
  }
  .config-item .config-val {
    font-size: 13px; font-family: 'Courier New', monospace; color: #ccc;
  }

  /* Log panel */
  .log-panel {
    width: 340px; background: #0d1117;
    border-left: 1px solid #0f3460;
    display: flex; flex-direction: column;
  }
  .log-header {
    padding: 10px 16px; font-size: 13px; font-weight: 600;
    color: #888; border-bottom: 1px solid #1a2332;
    text-transform: uppercase; letter-spacing: 1px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .log-close {
    display: none; background: none; border: none;
    color: #888; font-size: 22px; cursor: pointer; padding: 0 4px; line-height: 1;
  }
  .log-close:hover { color: #eee; }
  .log-content {
    flex: 1; overflow-y: auto; padding: 8px 12px;
    font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.6;
  }
  .log-entry { color: #7f8c8d; }
  .log-entry.info { color: #3498db; }
  .log-entry.cmd { color: #555; }
  .log-entry.warn { color: #f39c12; }
  .log-entry.error { color: #e74c3c; }

  /* Log toggle button */
  .log-toggle {
    display: none; /* nur auf mobile sichtbar */
    background: #16213e; border: 1px solid #4a6fa5; border-radius: 6px;
    color: #888; font-size: 12px; padding: 4px 10px;
    cursor: pointer; margin-left: auto;
  }
  .log-toggle.has-new { color: #2ecc71; border-color: #2ecc71; }

  /* --- Tablet (601–900px) --- */
  @media (max-width: 900px) {
    .log-toggle { display: block; }
    .log-panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 300px; z-index: 100;
      transform: translateX(100%); transition: transform 0.25s;
    }
    .log-panel.open { transform: translateX(0); }
    .log-close { display: block; }
    .viz-panel { gap: 14px; padding: 12px; }
  }

  /* --- Phone (≤600px) --- */
  @media (max-width: 600px) {
    header { padding: 6px 12px; gap: 8px; }
    header h1 { font-size: 15px; }
    header h1 img { width: 22px; height: 22px; }

    .viz-panel { gap: 10px; padding: 8px; justify-content: flex-start; }

    /* Kleineres Auto */
    .car-container { width: 120px; height: 190px; }
    .car-body { top: 20px; left: 17px; width: 86px; height: 150px; border-radius: 20px 20px 14px 14px; }
    .car-front { top: 28px; left: 40px; width: 40px; height: 7px; }
    .wheel { width: 16px; height: 36px; border-radius: 4px; }
    .wheel-arrow { font-size: 13px; }
    .wh-fl { top: 34px; left: 5px; }
    .wh-fr { top: 34px; right: 5px; }
    .wh-rl { top: 122px; left: 5px; }
    .wh-rr { top: 122px; right: 5px; }

    .direction-arrow { width: 40px; height: 40px; }

    /* Joystick groesser fuer Touch */
    .joystick-container { width: 200px; height: 200px; }
    .joystick-knob { width: 56px; height: 56px; top: 72px; left: 72px; }

    /* WASD-Buttons auf Handy verstecken — Joystick reicht */
    .controls { display: none; }
    .input-row { gap: 0; justify-content: center; }

    /* Motor-Werte kompakter */
    .motor-values { gap: 12px; }
    .motor-val .value { font-size: 18px; }
    .motor-val .value.rpm { font-size: 16px; }
    .motor-val .label { font-size: 10px; }

    /* Config-Slider vertikal stapeln */
    .config-panel { flex-direction: column; gap: 8px; padding: 8px 12px; }
    .config-item { flex-direction: row; gap: 8px; width: 100%; }
    .config-item label { min-width: 80px; text-align: right; font-size: 10px; }
    .config-item input[type="range"] { flex: 1; min-width: 0; }

    /* Log-Panel als Fullscreen-Overlay */
    .log-panel { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <h1><img src="/icon.png" alt="car">Car Controller</h1>
  <div class="status-group">
    <div class="indicator"><div class="dot" id="dotEsp"></div><span>ESP32</span></div>
  </div>
  <button class="log-toggle" id="logToggle">Console</button>
</header>

<div class="main">
  <div class="viz-panel">

    <div class="direction-arrow hidden" id="dirArrow">
      <svg viewBox="0 0 100 100">
        <polygon points="50,10 80,60 65,60 65,90 35,90 35,60 20,60" fill="#2ecc71" />
      </svg>
    </div>

    <div class="car-container">
      <div class="car-body"></div>
      <div class="car-front"></div>
      <div class="wheel wh-fl" id="whFL"><span class="wheel-arrow">&#9650;</span></div>
      <div class="wheel wh-fr" id="whFR"><span class="wheel-arrow">&#9650;</span></div>
      <div class="wheel wh-rl" id="whRL"><span class="wheel-arrow">&#9650;</span></div>
      <div class="wheel wh-rr" id="whRR"><span class="wheel-arrow">&#9650;</span></div>
    </div>

    <div class="motor-values">
      <div class="motor-val">
        <div class="label">Left PWM</div>
        <div class="value" id="leftVal">0</div>
        <div class="motor-bar"><div class="motor-bar-fill" id="leftBar"></div></div>
      </div>
      <div class="motor-val">
        <div class="label">Left RPM</div>
        <div class="value rpm" id="leftRpm">0</div>
      </div>
      <div class="motor-val">
        <div class="label">Right RPM</div>
        <div class="value rpm" id="rightRpm">0</div>
      </div>
      <div class="motor-val">
        <div class="label">Right PWM</div>
        <div class="value" id="rightVal">0</div>
        <div class="motor-bar"><div class="motor-bar-fill" id="rightBar"></div></div>
      </div>
    </div>

    <div class="input-row">
      <!-- Virtual Joystick -->
      <div class="joystick-container" id="joystickContainer">
        <div class="joystick-crosshair-h"></div>
        <div class="joystick-crosshair-v"></div>
        <div class="joystick-knob" id="joystickKnob"></div>
      </div>

      <!-- WASD -->
      <div class="controls">
        <div class="key-btn key-w" id="btnW">W</div>
        <div class="key-btn key-a" id="btnA">A</div>
        <div class="key-btn key-s" id="btnS">S</div>
        <div class="key-btn key-d" id="btnD">D</div>
      </div>
    </div>

    <!-- Config sliders -->
    <div class="config-panel">
      <div class="config-item">
        <label for="sliderAccel">Acceleration</label>
        <input type="range" id="sliderAccel" min="0.1" max="2.0" step="0.1" value="0.5" />
        <span class="config-val" id="valAccel">0.5s</span>
      </div>
      <div class="config-item">
        <label for="sliderTurn">Turn Sharpness</label>
        <input type="range" id="sliderTurn" min="0" max="1.0" step="0.05" value="0.5" />
        <span class="config-val" id="valTurn">0.50</span>
      </div>
      <div class="config-item">
        <label for="sliderSpeed">Max Speed</label>
        <input type="range" id="sliderSpeed" min="0" max="255" step="5" value="255" />
        <span class="config-val" id="valSpeed">255</span>
      </div>
    </div>

  </div>

  <div class="log-panel">
    <div class="log-header">Console <button class="log-close" id="logClose">&times;</button></div>
    <div class="log-content" id="logContent"></div>
  </div>
</div>

<script>
// =============================================================================
// ZUSTAND — Variablen die das Programm sich merken muss
// =============================================================================

let ws; // Die WebSocket-Verbindung zum ESP32 (wird in connectWs() erstellt)

// Welche Tasten gerade gedrückt sind (z.B. {'w', 'd'})
const keysDown = new Set();

// Joystick-Vektor: wohin der Nutzer gerade zieht (x/y je -1 bis +1)
const joystickVector = { x: 0, y: 0 };

// Zielvektor: wo das Auto hinfahren soll (kommt von Tastatur oder Joystick)
const targetVector = { x: 0, y: 0 };

// Aktueller Vektor: wo das Auto gerade "ist" — wird sanft zum Ziel bewegt (Rampe)
const currentVector = { x: 0, y: 0 };

let lastControlTime = performance.now(); // Zeitstempel des letzten Steuer-Ticks
let joystickActive = false;              // true wenn der Nutzer den Joystick berührt

// Einstellwerte — werden über die Schieberegler live verändert
let accelTime     = 0.5;  // Beschleunigungszeit in Sekunden (wie schnell auf Vollgas)
let turnSharpness = 0.5;  // Kurvenradius: 0 = weicher Bogen, 1 = Pirouette auf der Stelle
let maxSpeed      = 255;  // Maximale PWM-Ausgabe (0–255)

// Referenzen auf HTML-Elemente — einmal holen, öfter nutzen
const logEl   = document.getElementById('logContent');
const dirArrow = document.getElementById('dirArrow');
const dotEsp   = document.getElementById('dotEsp');


// =============================================================================
// KONSOLE — Meldungen in die Log-Box rechts schreiben
// =============================================================================

// Schreibt eine Zeile in die Konsole. cls = Farbe: 'info', 'warn', 'error' oder leer
function log(msg, cls) {
  const div = document.createElement('div');
  div.className = 'log-entry ' + (cls || '');
  const ts = new Date().toLocaleTimeString();
  div.textContent = '[' + ts + '] ' + msg;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight; // automatisch nach unten scrollen
  // Maximal 200 Einträge behalten — sonst wird der Speicher voll
  if (logEl.children.length > 200) logEl.firstChild.remove();
}


// =============================================================================
// STEUERMODELL — Tasten/Joystick → Vektor → Motoren
// Funktioniert wie ein 2D-Joystick: x = links/rechts, y = vor/zurück
// =============================================================================

// Wandelt gedrückte WASD-Tasten in einen Richtungsvektor um
// W = vorwärts (y+1), S = rückwärts (y-1), A = links (x-1), D = rechts (x+1)
function keysToVector() {
  let x = 0, y = 0;
  if (keysDown.has('w')) y += 1;
  if (keysDown.has('s')) y -= 1;
  if (keysDown.has('a')) x -= 1;
  if (keysDown.has('d')) x += 1;
  // Auf maximal ±1 begrenzen (wichtig bei diagonaler Fahrt W+D gleichzeitig)
  return [Math.max(-1, Math.min(1, x)), Math.max(-1, Math.min(1, y))];
}

// Bestimmt den Zielvektor: Joystick hat Vorrang, sonst Tastatur
function computeTarget() {
  if (Math.abs(joystickVector.x) > 0.01 || Math.abs(joystickVector.y) > 0.01) {
    // Joystick wird benutzt → dessen Wert nehmen
    targetVector.x = joystickVector.x;
    targetVector.y = joystickVector.y;
  } else {
    // Kein Joystick → Tastaturtasten auswerten
    const kv = keysToVector();
    targetVector.x = kv[0];
    targetVector.y = kv[1];
  }
}

// Bewegt den aktuellen Vektor sanft in Richtung Zielvektor (Beschleunigungsrampe)
// dt = vergangene Zeit in Sekunden seit letztem Aufruf
// Je kleiner accelTime, desto schneller wird der Zielwert erreicht
function rampTowardTarget(dt) {
  const rate = dt / Math.max(accelTime, 0.01); // Schrittgröße pro Tick
  for (const axis of ['x', 'y']) {
    const diff = targetVector[axis] - currentVector[axis];
    if (Math.abs(diff) < rate) {
      currentVector[axis] = targetVector[axis]; // Ziel erreicht — einrasten
    } else {
      currentVector[axis] += rate * (diff > 0 ? 1 : -1); // Schritt in Richtung Ziel
    }
  }
}

// Rechnet den Vektor in links/rechts Motor-PWM um (Differentialantrieb-Formel)
// links  = y + x × turnSharpness
// rechts = y - x × turnSharpness
// Ergebnis: ganzzahlige PWM-Werte -255 bis +255
function mixToMotors() {
  const x = currentVector.x;
  const y = currentVector.y;
  let leftF  = y + x * turnSharpness;
  let rightF = y - x * turnSharpness;
  // Auf ±1 begrenzen (kann bei gleichzeitig vollem y und x überschritten werden)
  leftF  = Math.max(-1, Math.min(1, leftF));
  rightF = Math.max(-1, Math.min(1, rightF));
  return [Math.round(leftF * maxSpeed), Math.round(rightF * maxSpeed)];
}


// =============================================================================
// STEUER-SCHLEIFE — läuft alle 50ms automatisch
// Berechnet Motorwerte und schickt sie per WebSocket an den ESP32
// =============================================================================

setInterval(function() {
  const now = performance.now();
  const dt = Math.min((now - lastControlTime) / 1000, 0.1); // max 100ms, verhindert Sprung nach Tab-Wechsel
  lastControlTime = now;

  computeTarget();       // Ziel aus Eingabe berechnen
  rampTowardTarget(dt);  // sanft zum Ziel bewegen
  const mr = mixToMotors();
  const left = mr[0], right = mr[1];

  // Fahrbefehl als Text an ESP32 schicken: "links,rechts" z.B. "200,-150"
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(left + ',' + right);
  }

  // Anzeige im Browser aktualisieren
  updateViz(left, right);
}, 50);


// =============================================================================
// WEBSOCKET — Verbindung zum ESP32
// Der Browser verbindet sich direkt auf Port 81 des ESP32
// =============================================================================

function connectWs() {
  // IP-Adresse automatisch aus der Browser-URL lesen (gleicher Host wie die Webseite)
  const host = location.hostname;
  const url = 'ws://' + host + ':81';
  log('Verbinde mit ' + url + '...', 'info');
  ws = new WebSocket(url);

  // Verbindung erfolgreich aufgebaut
  ws.onopen = function() {
    dotEsp.classList.add('on'); // grüner Punkt im Header
    log('Verbunden mit ESP32', 'info');
  };

  // Verbindung getrennt → nach 3 Sekunden neu versuchen
  ws.onclose = function() {
    dotEsp.classList.remove('on');
    log('Verbindung zum ESP32 verloren', 'error');
    setTimeout(connectWs, 3000);
  };

  ws.onerror = function() {
    log('WebSocket Fehler', 'error');
  };

  // Telemetrie vom ESP32 empfangen
  // Format: "T:linksRPM,rechtsRPM" — z.B. "T:142.3,138.7"
  ws.onmessage = function(e) {
    var msg = e.data;
    if (typeof msg === 'string' && msg.indexOf('T:') === 0) {
      var parts = msg.substring(2).split(','); // "T:" abschneiden, dann aufteilen
      if (parts.length >= 2) {
        // RPM-Werte in der Anzeige aktualisieren
        document.getElementById('leftRpm').textContent  = Number.parseFloat(parts[0]).toFixed(1);
        document.getElementById('rightRpm').textContent = Number.parseFloat(parts[1]).toFixed(1);
      }
    }
  };
}


// =============================================================================
// SCHIEBEREGLER — Fahrparameter live einstellen
// =============================================================================

function updateConfig() {
  accelTime     = Number.parseFloat(document.getElementById('sliderAccel').value);
  turnSharpness = Number.parseFloat(document.getElementById('sliderTurn').value);
  maxSpeed      = Number.parseInt(document.getElementById('sliderSpeed').value);
  // Aktuelle Werte neben den Schiebereglern anzeigen
  document.getElementById('valAccel').textContent = accelTime.toFixed(1) + 's';
  document.getElementById('valTurn').textContent  = turnSharpness.toFixed(2);
  document.getElementById('valSpeed').textContent = maxSpeed;
  log('Einstellungen: Beschl.=' + accelTime + 's, Kurve=' + turnSharpness.toFixed(2) + ', Speed=' + maxSpeed, 'warn');
}
// Bei jeder Bewegung eines Schiebereglers sofort anwenden
document.getElementById('sliderAccel').addEventListener('input', updateConfig);
document.getElementById('sliderTurn').addEventListener('input', updateConfig);
document.getElementById('sliderSpeed').addEventListener('input', updateConfig);


// =============================================================================
// VISUALISIERUNG — Anzeige im Browser aktualisieren
// =============================================================================

// Hauptfunktion: aktualisiert alle visuellen Elemente mit den aktuellen Motorwerten
function updateViz(left, right) {
  // PWM-Zahlenwerte anzeigen
  document.getElementById('leftVal').textContent  = left;
  document.getElementById('rightVal').textContent = right;

  // Balkenanzeige: Breite = Stärke, Farbe = Richtung (grün = vor, rot = zurück)
  var leftBar  = document.getElementById('leftBar');
  var rightBar = document.getElementById('rightBar');
  leftBar.style.width  = (Math.abs(left)  / 255 * 100) + '%';
  rightBar.style.width = (Math.abs(right) / 255 * 100) + '%';
  leftBar.style.background  = left  >= 0 ? '#2ecc71' : '#e74c3c';
  rightBar.style.background = right >= 0 ? '#2ecc71' : '#e74c3c';

  // Hinterräder einfärben (Vorderräder bleiben neutral — kein Antrieb)
  updateWheel('whRL', left);
  updateWheel('whRR', right);
  document.getElementById('whFL').className = 'wheel wh-fl';
  document.getElementById('whFR').className = 'wheel wh-fr';

  // WASD-Buttons leuchten wenn die entsprechende Taste gedrückt ist
  ['w','a','s','d'].forEach(function(k) {
    document.getElementById('btn' + k.toUpperCase()).classList.toggle('active', keysDown.has(k));
  });

  // Joystick-Knopf spiegelt den aktuellen Vektor wider (wenn nicht aktiv gezogen)
  if (!joystickActive) {
    positionKnob(currentVector.x, currentVector.y, false);
  }

  updateDirectionArrow(left, right);
}

// Färbt ein Rad ein und zeigt Pfeil-Richtung an
function updateWheel(id, value) {
  var el    = document.getElementById(id);
  var arrow = el.querySelector('.wheel-arrow');
  el.className = 'wheel ' + (id === 'whRL' ? 'wh-rl' : 'wh-rr');
  if (value > 0)      { el.classList.add('active-fwd'); arrow.innerHTML = '&#9650;'; } // grün, Pfeil hoch
  else if (value < 0) { el.classList.add('active-bwd'); arrow.innerHTML = '&#9660;'; } // rot, Pfeil runter
}

// Dreht den Richtungspfeil je nach Fahrrichtung
function updateDirectionArrow(left, right) {
  if (left === 0 && right === 0) {
    dirArrow.classList.add('hidden'); // Stillstand → Pfeil ausblenden
    dirArrow.style.transform = 'rotate(0deg)';
    return;
  }
  dirArrow.classList.remove('hidden');
  // Vorwärtskomponente (positiv = vor, negativ = zurück) und Drehkomponente berechnen
  var forward = (left + right) / 2;
  var turn    = (left - right) / 2;
  // atan2 liefert den Winkel kontinuierlich: 0° = vorwärts, 90° = rechts, 180° = rückwärts
  var angle = Math.atan2(turn, forward) * (180 / Math.PI);
  dirArrow.style.transform = 'rotate(' + angle + 'deg)';
}


// =============================================================================
// VIRTUELLER JOYSTICK — Maus und Touch-Steuerung
// =============================================================================

var joyContainer = document.getElementById('joystickContainer');
var joyKnob      = document.getElementById('joystickKnob');

// Positioniert den Knopf im Joystick-Kreis anhand normierter x/y-Werte (-1 bis +1)
function positionKnob(nx, ny, isActive) {
  var r     = joyContainer.offsetWidth / 2;  // Radius des Joystick-Kreises
  var knobR = joyKnob.offsetWidth / 2;       // Radius des Knopfes
  joyKnob.style.left = (nx * r + r - knobR) + 'px';
  joyKnob.style.top  = (-ny * r + r - knobR) + 'px'; // y invertiert (oben = positiv)
  joyKnob.classList.toggle('active', isActive);
}

// Berechnet den Joystick-Vektor aus einer Maus/Touch-Position
function handleJoystickInput(clientX, clientY) {
  var rect = joyContainer.getBoundingClientRect(); // Position des Kreises auf dem Bildschirm
  var r    = rect.width / 2;
  var dx   = (clientX - rect.left - r) / r; // Abstand vom Mittelpunkt, normiert auf ±1
  var dy   = -(clientY - rect.top  - r) / r;
  // Auf Einheitskreis begrenzen — damit diagonale Bewegung nicht schneller ist
  var mag = Math.hypot(dx, dy);
  if (mag > 1) { dx /= mag; dy /= mag; }
  positionKnob(dx, dy, true);
  joystickVector.x = Number.parseFloat(dx.toFixed(2));
  joystickVector.y = Number.parseFloat(dy.toFixed(2));
}

// Joystick loslassen → Knopf zurück zur Mitte, Vektor auf 0
function releaseJoystick() {
  joystickActive = false;
  positionKnob(0, 0, false);
  joystickVector.x = 0;
  joystickVector.y = 0;
}

// Maus-Events für den Joystick
joyContainer.addEventListener('mousedown', function(e) {
  e.preventDefault();
  joystickActive = true;
  handleJoystickInput(e.clientX, e.clientY);
});
document.addEventListener('mousemove', function(e) {
  if (joystickActive) handleJoystickInput(e.clientX, e.clientY);
});
document.addEventListener('mouseup', function() {
  if (joystickActive) releaseJoystick();
});

// Touch-Events für Smartphone/Tablet
joyContainer.addEventListener('touchstart', function(e) {
  e.preventDefault();
  joystickActive = true;
  handleJoystickInput(e.touches[0].clientX, e.touches[0].clientY);
});
joyContainer.addEventListener('touchmove', function(e) {
  e.preventDefault(); // verhindert Scrollen nur innerhalb des Joystick-Bereichs
  handleJoystickInput(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
joyContainer.addEventListener('touchend', function() {
  releaseJoystick();
});


// =============================================================================
// TASTATUR — WASD-Tasten erkennen
// =============================================================================

document.addEventListener('keydown', function(e) {
  // Keine Tasten abfangen wenn gerade ein Eingabefeld aktiv ist (z.B. IP-Feld)
  if (document.activeElement.tagName === 'INPUT') return;
  var key = e.key.toLowerCase();
  if ('wasd'.includes(key) && !keysDown.has(key)) {
    keysDown.add(key);
  }
});
document.addEventListener('keyup', function(e) {
  if (document.activeElement.tagName === 'INPUT') return;
  var key = e.key.toLowerCase();
  if ('wasd'.includes(key)) {
    keysDown.delete(key);
  }
});

// On-Screen WASD-Buttons — funktionieren mit Maus und Touch
['w','a','s','d'].forEach(function(key) {
  var btn = document.getElementById('btn' + key.toUpperCase());
  function down(e) {
    e.preventDefault();
    if (!keysDown.has(key)) keysDown.add(key);
  }
  function up(e) {
    e.preventDefault();
    keysDown.delete(key);
  }
  btn.addEventListener('mousedown', down);
  btn.addEventListener('mouseup',   up);
  btn.addEventListener('mouseleave', up); // Taste loslassen wenn Maus das Element verlässt
  btn.addEventListener('touchstart', down);
  btn.addEventListener('touchend',   up);
});

// Sicherheit: Wenn das Browserfenster den Fokus verliert (z.B. Alt+Tab),
// alle Tasten loslassen und Joystick zurücksetzen → Motoren stoppen
window.addEventListener('blur', function() {
  keysDown.clear();
  joystickVector.x = 0;
  joystickVector.y = 0;
  log('Fenster verloren — Motoren gestoppt', 'warn');
});


// =============================================================================
// KONSOLE-TOGGLE — Ein/Ausblenden auf Mobilgeräten
// =============================================================================

var logPanel  = document.querySelector('.log-panel');
var logTogBtn = document.getElementById('logToggle');

logTogBtn.addEventListener('click', function() {
  logPanel.classList.toggle('open');
  logTogBtn.classList.remove('has-new');
});

// Panel schliessen per X-Button
document.getElementById('logClose').addEventListener('click', function() {
  logPanel.classList.remove('open');
});

// Panel schliessen wenn man ausserhalb tippt
document.addEventListener('click', function(e) {
  if (logPanel.classList.contains('open') &&
      !logPanel.contains(e.target) && e.target !== logTogBtn) {
    logPanel.classList.remove('open');
  }
});

// Ursprüngliche log()-Funktion erweitern: bei geschlossenem Panel Button markieren
var _origLog = log;
log = function(msg, cls) {
  _origLog(msg, cls);
  if (!logPanel.classList.contains('open') && window.innerWidth <= 900) {
    logTogBtn.classList.add('has-new');
  }
};


// =============================================================================
// START — WebSocket-Verbindung herstellen
// =============================================================================

connectWs();
</script>
