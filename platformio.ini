[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_port = COM4
upload_port = COM4


upload_speed = 921600
board_build.filesystem = littlefs
lib_deps =
    links2004/WebSockets@^2.6.1
build_flags =
;    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CORE_DEBUG_LEVEL=5